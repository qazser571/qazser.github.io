<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/words-memorize.css">
    <script src="https://kit.fontawesome.com/514b3bc82c.js" crossorigin="anonymous"></script>
    <title>memorize</title>
</head>
<body>
    
    <div id="header">
        
    </div>
    <div id="container">
        <div id="contents">

            <div class="card-wrapper">
                <div class="card">
                    <div class="card-top">
                        <div class="card-top-inner">
                            <div class="card-spell">derail</div>
                            <div class="card-phon">[sfggasd]</div>
                        </div>
                    </div>
                    <div class="card-bottom">
                        <div class="card-means">탈선하다</div>
                        <div class="card-cover"><span>클릭하여 의미 보기</span></div>
                    </div>
                </div>
            </div>
            
            <div id="move-btns">
                <div id="prev-btn1"><i class="fa-solid fa-chevron-left"></i></div>
                <div id="next-btn1"><i class="fa-solid fa-chevron-right"></i></div>
            </div>
        </div>
        <div id="contents-btns">
            <div id="contents-btns-inner">
                <div id="idontknow-btn">아직 몰라요</div>
                <div id="iknow-btn">이제 알아요</div>
            </div>
        </div>
    </div>

    <script src="./js/words-memorize.js"></script>
</body>
</html>
